name: Generate Android Keystore

on:
  workflow_dispatch:

jobs:
  generate-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore flipfinder.keystore \
            -alias flipfinder \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass Flipfinder2024 \
            -keypass Flipfinder2024 \
            -dname "CN=FlipFinder, OU=FlipFinder, O=FlipFinder, L=Nairobi, ST=Nairobi, C=KE"

      - name: Upload keystore as artifact
        uses: actions/upload-artifact@v3
        with:
          name: flipfinder-keystore
          path: flipfinder.keystore
```

---

### Step 3 — Commit the file

Scroll down and click **Commit new file**.

---

### Step 4 — Run the workflow

- Click the **Actions** tab at the top of your GitHub repo
- On the left you'll see **Generate Android Keystore** — click it
- Click the **Run workflow** button on the right
- Click the green **Run workflow** button that appears
- Wait about 30 seconds

---

### Step 5 — Download your keystore file

- Click on the workflow run that just finished — it will have a green checkmark ✅
- Scroll to the bottom of the page
- Under **Artifacts** you'll see **flipfinder-keystore**
- Click it to download a zip file
- Unzip it — inside is your `flipfinder.keystore` file

---

### Step 6 — Upload to Expo

Go back to Expo and upload the file with these details:

| Field | Value |
|---|---|
| Keystore file | `flipfinder.keystore` |
| Keystore alias | `flipfinder` |
| Keystore password | `Flipfinder2024` |
| Key password | `Flipfinder2024` |

---

### Step 7 — Save these details somewhere safe

Write this down and back up the keystore file to Google Drive:
```
Keystore file:     flipfinder.keystore
Keystore alias:    flipfinder  
Keystore password: Flipfinder2024
Key password:      Flipfinder2024
